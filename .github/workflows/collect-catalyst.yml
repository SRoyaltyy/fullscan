name: "Catalyst Analysis Engine"

on:
  schedule:
    - cron: "0 15 * * 1-5"   # 3 PM UTC on weekdays (after market close)
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install openai requests
      - name: Install dependencies
        run: pip install -r requirements.txt  
      - name: Run catalyst analysis
        env:
          GEMINI_BROWSER_STATE: ${{ secrets.GEMINI_BROWSER_STATE }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SEARXNG_URL: ${{ secrets.SEARXNG_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
          CLOAK_SILENT: 1  
        run: python -m collectors.catalyst_analysis
