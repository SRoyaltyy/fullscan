name: Collect SEC Filings & Insider Trades

on:
  schedule:
    - cron: '0 14 * * 1-5'  # Weekdays at 2:00 PM UTC (after market hours)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests psycopg2-binary pandas edgartools python-dotenv

      - name: Run SEC filings collector
        env:
          EDGAR_IDENTITY: ${{ secrets.EDGAR_IDENTITY }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: python collectors/sec_filings_collector.py
