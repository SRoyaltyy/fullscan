name: Gemini Catcher (CloakBrowser Async)

on:
  workflow_dispatch:

jobs:
  catch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m cloakbrowser install

      - name: Run Gemini catcher
        env:
          GEMINI_BROWSER_STATE: ${{ secrets.GEMINI_BROWSER_STATE }}
        run: python gemini_catcher.py

      - name: Upload debug screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-debug
          path: |
            gemini_debug_input.png
            gemini_debug_response.png
