name: Gemini Catcher (CloakBrowser)

on:
  workflow_dispatch:

jobs:
  catch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # Cloaker may need to download its custom Chromium binary on first run
          # Pre‑fetch it now so the actual run doesn't timeout
          python -c "from cloaker import CloakBrowser; import asyncio; asyncio.run(CloakBrowser.download_binary())"

      - name: Run Gemini catcher
        env:
          GEMINI_BROWSER_STATE: ${{ secrets.GEMINI_BROWSER_STATE }}
        run: python gemini_runner.py

      - name: Upload debug screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-debug
          path: |
            gemini_debug_input.png
            gemini_debug_response.png
