name: Gemini Catcher Test

on:
  workflow_dispatch:

jobs:
  catch:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install --with-deps chromium
      - name: Run Gemini catcher
        env:
          GEMINI_BROWSER_STATE: ${{ secrets.GEMINI_BROWSER_STATE }}
        run: python gemini_runner.py
      - name: Upload debug screenshot (if input not found)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-debug
          path: gemini_debug.png
