name: "Collect: Ticker Master List"

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run collector
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m collectors.ticker_master
