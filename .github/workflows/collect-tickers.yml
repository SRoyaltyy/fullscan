name: "Collect: Ticker Master List"

on:
  schedule:
    - cron: "0 4 * * 0"          # Every Sunday at 04:00 UTC
  workflow_dispatch:               # Manual trigger button in GitHub UI

concurrency:
  group: db-write
  cancel-in-progress: false        # Queue, don't cancel

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        run: python -m collectors.ticker_master

      - name: Commit and push updated DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pipeline.db
          git diff --staged --quiet || git commit -m "data: update tickers $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
