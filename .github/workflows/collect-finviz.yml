name: "Collect: Finviz Financials"

on:
  schedule:
    - cron: "0 22 * * 5"
  workflow_dispatch:
  workflow_call:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run collector
        env:
          DATABASE_URL:    ${{ secrets.DATABASE_URL }}
          FINVIZ_EMAIL:    ${{ secrets.FINVIZ_EMAIL }}
          FINVIZ_PASSWORD: ${{ secrets.FINVIZ_PASSWORD }}
        run: python -m collectors.finviz_financials
