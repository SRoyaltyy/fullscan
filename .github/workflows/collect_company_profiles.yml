name: Collect Company Profiles

on:
  schedule:
    - cron: '0 10 * * 0'   # Every Sunday at 10:00 AM UTC
  workflow_dispatch:         # Also allows manual trigger

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests psycopg2-binary pandas edgartools python-dotenv

      - name: Run company profiles collector
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: python collectors/company_profiles_collector.py
