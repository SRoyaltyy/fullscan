name: Collect SEC Fundamentals

on:
  schedule:
    - cron: '0 11 * * 0'   # Every Sunday at 11:00 AM UTC
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run SEC fundamentals collector
        env:
          EDGAR_IDENTITY: ${{ secrets.EDGAR_IDENTITY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python collectors/sec_fundamentals_collector.py
