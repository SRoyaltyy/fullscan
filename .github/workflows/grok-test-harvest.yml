name: Grok Test Sheet Harvester

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Stock ticker to analyze (e.g. APLD)'
        required: true
        default: 'APLD'

jobs:
  harvest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install gspread google-auth
      
      - name: Create service_account.json from secret
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json
      
      - name: Run Grok Test Harvester
        run: python grok_test_harvester.py ${{ inputs.ticker }}
      
      - name: Upload analysis results
        uses: actions/upload-artifact@v4
        with:
          name: grok-analysis-results
          path: grok_analysis_output.json
      
      - name: Show results
        run: cat grok_analysis_output.json || echo 'No output file generated'