name: "Collect: Macro Sentiment"

on:
  schedule:
    - cron: "0 14 * * *"          # 2 PM UTC daily (after FRED collector at 1 PM)
  workflow_dispatch:

concurrency:
  group: db-write
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -m collectors.macro_sentiment

      - name: Commit and push updated DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pipeline.db
          git diff --staged --quiet || git commit -m "data: macro sentiment $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
